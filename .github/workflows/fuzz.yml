name: Fuzz

# Nightly extended fuzz of the two byte-level surfaces — the E1381 frame codec and the CLSI-LIS02
# record tokenizer. The same property suites run in every CI at a lower case count; this job scales
# them up (ASTM_FUZZ_RUNS) so rare degeneracies get more chances to surface off the PR critical path.
# Self-contained by design: fuzzing is an extra, scheduled surface, not one of the shared CI gates.

on:
  schedule:
    - cron: "17 4 * * *" # nightly, 04:17 UTC
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fuzz:
    runs-on: ubuntu-latest
    env:
      ASTM_FUZZ_RUNS: "25000"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:fuzz
